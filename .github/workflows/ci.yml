name: CI

on:
  push:
    branches: [main]
    paths:
      - "services/**"
  pull_request:
    branches: [main]
    paths:
      - "services/**"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test all services
        run: mvn clean install
        working-directory: services

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: services/**/target/surefire-reports/
          retention-days: 7
