spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/course_inventory
    username: default
    password: default
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

server:
  port: 8087
